<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GAINZ">
<meta name="theme-color" content="#0a0a0f">
<title>GAINZ Tracker</title>
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--card:#13131c;--border:#2a2a3a;--text:#f0f0f8;--muted:#6b6b8a;--accent:#7c6af7;--green:#22c55e;--amber:#f59e0b;--coral:#f43f5e;--purple:#a855f7;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;min-height:100vh;overflow-x:hidden}
.header{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:12px 16px 8px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:20px;font-weight:900;color:var(--accent);letter-spacing:3px}
.header-sub{font-size:11px;color:var(--muted)}
.nav{display:flex;gap:3px}
.nav-btn{flex:1;padding:7px 2px;background:none;border:none;border-radius:8px;font-size:10px;font-weight:600;color:var(--muted);cursor:pointer;text-transform:uppercase;letter-spacing:0.3px;transition:all 0.2s}
.nav-btn.active{background:var(--accent);color:#fff}
.main{padding:0 0 80px}
/* SHARED */
.dashboard{margin:12px;background:var(--card);border-radius:20px;padding:16px;border:0.5px solid var(--border)}
.dash-row{display:flex;gap:12px;margin-bottom:14px}
.dash-main{flex:1}
.dash-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px}
.dash-score{font-size:52px;font-weight:900;line-height:1}
.dash-sub{font-size:12px;color:var(--muted);margin:4px 0 8px}
.score-track{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden}
.score-fill{height:6px;border-radius:99px;transition:width 0.5s ease}
.dash-right{display:flex;flex-direction:column;gap:8px}
.stat-box{background:var(--bg3);border-radius:12px;padding:10px;text-align:center;min-width:64px}
.stat-emoji{font-size:16px}
.stat-num{font-size:20px;font-weight:800}
.stat-label{font-size:9px;color:var(--muted);margin-top:1px}
.stats-row{display:flex;border-top:0.5px solid var(--border);padding-top:12px}
.mini-stat{flex:1;text-align:center}
.mini-num{font-size:18px;font-weight:800}
.mini-label{font-size:10px;color:var(--muted);margin-top:2px}
.mini-div{width:0.5px;background:var(--border)}
.milestones{display:flex;gap:8px;padding:4px 12px 8px;overflow-x:auto;scrollbar-width:none}
.milestones::-webkit-scrollbar{display:none}
.badge{display:flex;flex-direction:column;align-items:center;background:var(--card);border-radius:12px;padding:10px;border:0.5px solid var(--border);min-width:60px;flex-shrink:0}
.badge.got{border-color:var(--amber);background:rgba(245,158,11,0.08)}
.badge-emoji{font-size:20px;margin-bottom:4px}
.badge-text{font-size:10px;color:var(--muted);font-weight:600}
.badge.got .badge-text{color:var(--amber)}
.switcher{display:flex;margin:0 12px 10px;background:var(--bg3);border-radius:12px;padding:3px}
.sw-btn{flex:1;padding:8px;background:none;border:none;border-radius:10px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.2s}
.sw-btn.active{background:var(--card);color:var(--text)}
.card{margin:0 12px 12px;background:var(--card);border-radius:20px;padding:16px;border:0.5px solid var(--border)}
.card-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px}
/* WEEK/MONTH */
.week-row{display:flex;justify-content:space-between;align-items:flex-end;height:130px}
.wday{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.wscore{font-size:9px;font-weight:700}
.wbar-bg{width:28px;height:80px;background:var(--bg3);border-radius:6px;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden}
.wbar-fill{width:100%;border-radius:6px}
.wlabel{font-size:10px;color:var(--muted)}
.wlabel.tod{color:var(--accent);font-weight:700}
.wdot{width:5px;height:5px;border-radius:50%;background:var(--accent)}
.wsummary{border-top:0.5px solid var(--border);padding-top:10px;margin-top:10px;text-align:center;font-size:13px;color:var(--muted)}
.mgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px}
.mcell{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff}
.mcell.tod{outline:2px solid #fff}
.leg-row{display:flex;justify-content:center;gap:10px;margin-top:12px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.leg-dot{width:10px;height:10px;border-radius:3px}
.mavg{text-align:center;margin-top:10px;font-size:13px;color:var(--muted)}
/* HABITS */
.cat-card{margin:0 12px 8px;background:var(--card);border-radius:16px;border:0.5px solid var(--border);overflow:hidden}
.cat-hdr{display:flex;align-items:center;padding:12px;gap:8px;cursor:pointer}
.cat-bar{width:4px;height:16px;border-radius:2px;flex-shrink:0}
.cat-title{font-size:11px;font-weight:700;flex:1;text-transform:uppercase;letter-spacing:0.5px}
.cat-sc{font-size:12px;font-weight:600;color:var(--muted);margin-right:4px}
.cat-chev{font-size:10px;color:var(--muted);transition:transform 0.2s}
.cat-chev.open{transform:rotate(180deg)}
.hrow{display:flex;align-items:center;padding:12px;border-top:0.5px solid var(--border);gap:10px;cursor:pointer}
.hrow:active{background:var(--bg3)}
.chk{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chk.on{border-color:transparent}
.chkmark{font-size:13px;color:#fff;font-weight:800;display:none}
.chk.on .chkmark{display:block}
.hemoji{font-size:15px}
.hlabel{flex:1;font-size:14px;line-height:1.4}
.hlabel.done{text-decoration:line-through;color:var(--muted)}
.hstrk{font-size:11px;color:var(--amber);font-weight:600}
.note{margin:4px 12px 12px;background:var(--bg3);border-radius:16px;padding:14px;border:0.5px solid var(--border);font-size:13px;line-height:1.6;font-style:italic;text-align:center}
/* LEARN */
.learn-header{margin:12px;background:var(--card);border-radius:20px;padding:16px;border:0.5px solid var(--border)}
.learn-day{font-size:40px;font-weight:900;color:var(--accent);line-height:1}
.learn-meta{font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:12px}
.learn-progress{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-bottom:8px}
.learn-prog-fill{height:6px;border-radius:99px;background:var(--accent)}
.learn-prog-label{font-size:11px;color:var(--muted)}
.phase-section{margin:0 12px 8px}
.phase-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;padding:0 4px}
.topic-card{background:var(--card);border-radius:14px;border:0.5px solid var(--border);margin-bottom:6px;overflow:hidden}
.topic-hdr{display:flex;align-items:center;padding:12px;gap:10px;cursor:pointer}
.topic-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.topic-info{flex:1}
.topic-title{font-size:14px;font-weight:600;color:var(--text)}
.topic-sub{font-size:11px;color:var(--muted);margin-top:2px}
.topic-chev{font-size:10px;color:var(--muted);transition:transform 0.2s}
.topic-chev.open{transform:rotate(180deg)}
.topic-done{font-size:11px;padding:3px 8px;border-radius:99px;font-weight:600;flex-shrink:0}
.topic-body{border-top:0.5px solid var(--border);padding:14px}
.session-tabs{display:flex;gap:4px;margin-bottom:12px}
.sess-btn{flex:1;padding:6px;background:var(--bg3);border:none;border-radius:8px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer}
.sess-btn.active{background:var(--accent);color:#fff}
.section-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;margin-top:12px}
.section-title:first-child{margin-top:0}
.concept-item{display:flex;gap:8px;margin-bottom:6px}
.concept-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:6px;flex-shrink:0}
.concept-text{font-size:13px;line-height:1.5}
.practice-box{background:var(--bg3);border-radius:10px;padding:12px;font-size:13px;line-height:1.6}
.resource-box{background:rgba(124,106,247,0.1);border-radius:10px;padding:10px;font-size:12px;color:var(--accent);margin-top:8px}
.interview-item{display:flex;gap:8px;margin-bottom:8px}
.mark-done-btn{width:100%;margin-top:14px;padding:10px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.mark-done-btn.done{background:var(--green)}
.week-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;margin-right:6px}
/* INTERVIEW PREP */
.prep-header{margin:12px;background:var(--card);border-radius:20px;padding:16px;border:0.5px solid var(--border)}
.prep-title{font-size:28px;font-weight:900;color:var(--coral);line-height:1}
.prep-sub{font-size:12px;color:var(--muted);margin-top:6px;margin-bottom:12px}
.timer-box{background:var(--bg3);border-radius:14px;padding:14px;text-align:center;margin-bottom:12px}
.timer-display{font-size:40px;font-weight:900;color:var(--amber);letter-spacing:2px}
.timer-label{font-size:11px;color:var(--muted);margin-top:4px}
.timer-btns{display:flex;gap:8px;margin-top:10px}
.timer-btn{flex:1;padding:8px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer}
.prep-card{margin:0 12px 8px;background:var(--card);border-radius:16px;border:0.5px solid var(--border);overflow:hidden}
.prep-cat-hdr{display:flex;align-items:center;padding:12px;gap:8px;cursor:pointer}
.prep-q-row{border-top:0.5px solid var(--border);padding:12px;cursor:pointer}
.prep-q{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
.prep-a{font-size:13px;color:var(--muted);line-height:1.6;display:none}
.prep-a.show{display:block}
.prep-ans-btn{font-size:11px;color:var(--accent);font-weight:600;margin-top:6px;cursor:pointer;background:none;border:none;padding:0}
.prep-done-badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600;float:right}
/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem}
.stat-card{background:var(--bg3);border-radius:14px;padding:14px;border:0.5px solid var(--border)}
.stat-card-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.stat-card-val{font-size:24px;font-weight:900;color:var(--text)}
.stat-card-sub{font-size:11px;color:var(--muted);margin-top:2px}
.stats-tab-row{display:flex;gap:4px;margin-bottom:12px}
.stats-tab{flex:1;padding:7px;background:var(--bg3);border:none;border-radius:10px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer}
.stats-tab.active{background:var(--card);color:var(--text);border:0.5px solid var(--border)}
.chart-card{background:var(--card);border-radius:16px;border:0.5px solid var(--border);padding:14px;margin-bottom:10px}
.chart-card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.chart-card-sub{font-size:11px;color:var(--muted);margin-bottom:12px}
.hm-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-bottom:10px}
.hm-cell{aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;color:rgba(255,255,255,0.85);font-weight:700}
.chart-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.chart-legend span{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}
/* WORKOUT LOG */
.workout-banner{background:rgba(245,158,11,0.1);border:0.5px solid rgba(245,158,11,0.3);border-radius:14px;margin:0 12px 10px;padding:14px;cursor:pointer}
.workout-banner-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.workout-day-badge{background:#f59e0b;color:#000;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px}
.workout-type{font-size:13px;font-weight:600;color:var(--text)}
.workout-exercises{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ex-row{background:var(--bg3);border-radius:8px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center}
.ex-name{font-size:12px;color:var(--text)}
.ex-sets{font-size:11px;color:var(--amber);font-weight:700}
.log-form{background:var(--card);border-radius:14px;margin:0 12px 10px;padding:14px;border:0.5px solid var(--border)}
.log-form-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px}
.log-entries{margin-bottom:10px}
.log-entry{background:var(--bg3);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.log-date{font-size:11px;color:var(--accent);font-weight:600}
.log-text{flex:1;margin:0 8px}
.log-input{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);margin-bottom:8px;font-family:inherit}
.log-save-btn{width:100%;padding:10px;background:var(--amber);border:none;border-radius:10px;color:#000;font-size:13px;font-weight:700;cursor:pointer}
/* CODING */
.code-header{margin:12px;background:var(--card);border-radius:20px;padding:16px;border:0.5px solid var(--border)}
.code-title{font-size:28px;font-weight:900;color:var(--green);line-height:1}
.code-sub{font-size:12px;color:var(--muted);margin-top:6px;margin-bottom:12px}
.code-card{margin:0 12px 8px;background:var(--card);border-radius:16px;border:0.5px solid var(--border);overflow:hidden}
.code-hdr{display:flex;align-items:center;padding:12px;gap:10px;cursor:pointer}
.code-tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700}
.code-body{border-top:0.5px solid var(--border);padding:14px}
.code-block{background:#0d0d1a;border-radius:10px;padding:12px;font-family:'Courier New',monospace;font-size:12px;color:#a8daff;line-height:1.6;overflow-x:auto;white-space:pre;margin:8px 0}
.code-task{background:rgba(34,197,94,0.08);border-left:3px solid var(--green);border-radius:0 10px 10px 0;padding:12px;font-size:13px;line-height:1.6;margin:8px 0}
.diff-badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700;margin-left:auto}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <span class="logo">GAINZ</span>
    <span class="header-sub" id="header-sub">Consistency Challenge</span>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="setPage('habits')">🔥 Habits</button>
    <button class="nav-btn" onclick="setPage('learn')">📚 Learn</button>
    <button class="nav-btn" onclick="setPage('interview')">⚡ Interview</button>
    <button class="nav-btn" onclick="setPage('coding')">💻 Coding</button>
    <button class="nav-btn" onclick="setPage('stats')">📊 Stats</button>
  </div>
</div>
<div class="main" id="main"></div>
<script>
// ═══ HABITS ═══
const HABITS=[
  {id:1,cat:'Morning Routine',label:'Wake up 5 A.M',emoji:'⏰'},
  {id:2,cat:'Morning Routine',label:'1 hour workout',emoji:'💪',hasWorkout:true},
  {id:3,cat:'Morning Routine',label:'Take cold shower',emoji:'🚿'},
  {id:4,cat:'Morning Routine',label:'Journaling',emoji:'📔'},
  {id:5,cat:'Health',label:'4L water',emoji:'💧'},
  {id:6,cat:'Health',label:'10k steps',emoji:'👟'},
  {id:7,cat:'Health',label:'No sugar',emoji:'🚫'},
  {id:8,cat:'Personal Growth',label:'Learn new skill',emoji:'🧠'},
  {id:9,cat:'Personal Growth',label:'Communication skill',emoji:'🗣️'},
  {id:10,cat:'Personal Growth',label:'Work on side hustle',emoji:'💼'},
  {id:11,cat:'Digital Detox',label:'No screentime 1hr after wakeup & before bed',emoji:'📵'},
  {id:12,cat:'Digital Detox',label:'Offline games',emoji:'🎮'},
  {id:13,cat:'Night Routine',label:'Plan your next day',emoji:'📋'},
  {id:14,cat:'Night Routine',label:'Sleep at 10:30 PM',emoji:'😴'},
  {id:15,cat:'Night Routine',label:'Do skincare',emoji:'✨'},
];
const HCOLORS={'Morning Routine':'#f59e0b','Health':'#22c55e','Personal Growth':'#7c6af7','Digital Detox':'#f43f5e','Night Routine':'#a855f7'};

const WORKOUT_PLANS={
  0:{day:'Sunday',type:'Rest / Active Recovery',exercises:[{name:'Light stretching',sets:'15 min'},{name:'Yoga or walk',sets:'30 min'},{name:'Foam rolling',sets:'15 min'}]},
  1:{day:'Monday',type:'Push — Chest, Shoulders, Triceps',exercises:[{name:'Push-ups',sets:'4×15'},{name:'Dumbbell shoulder press',sets:'4×12'},{name:'Incline push-ups',sets:'3×15'},{name:'Lateral raises',sets:'3×12'},{name:'Tricep dips',sets:'3×15'},{name:'Diamond push-ups',sets:'3×12'}]},
  2:{day:'Tuesday',type:'Pull — Back & Biceps',exercises:[{name:'Pull-ups / Assisted pull-ups',sets:'4×8'},{name:'Dumbbell rows',sets:'4×12'},{name:'Face pulls',sets:'3×15'},{name:'Bicep curls',sets:'3×12'},{name:'Hammer curls',sets:'3×12'},{name:'Reverse flies',sets:'3×12'}]},
  3:{day:'Wednesday',type:'Legs — Quads, Hamstrings, Glutes',exercises:[{name:'Squats',sets:'4×15'},{name:'Lunges',sets:'3×12 each'},{name:'Glute bridges',sets:'3×20'},{name:'Calf raises',sets:'4×20'},{name:'Step-ups',sets:'3×12'},{name:'Wall sit',sets:'3×45s'}]},
  4:{day:'Thursday',type:'Strength & Core',exercises:[{name:'Romanian deadlifts',sets:'4×10'},{name:'Plank',sets:'3×60s'},{name:'Russian twists',sets:'3×20'},{name:'Leg raises',sets:'3×15'},{name:'Mountain climbers',sets:'3×30s'},{name:'Hollow hold',sets:'3×30s'}]},
  5:{day:'Friday',type:'Push — Chest, Shoulders, Triceps',exercises:[{name:'Bench press / Push-ups',sets:'4×12'},{name:'Arnold press',sets:'4×10'},{name:'Chest flies',sets:'3×15'},{name:'Overhead press',sets:'3×12'},{name:'Skull crushers',sets:'3×12'},{name:'Close-grip push-ups',sets:'3×15'}]},
  6:{day:'Saturday',type:'Pull + Cardio',exercises:[{name:'Pull-ups',sets:'4×8'},{name:'Bent-over rows',sets:'4×12'},{name:'Cable rows',sets:'3×12'},{name:'Running / Jump rope',sets:'20 min'},{name:'Burpees',sets:'3×10'},{name:'Cool-down stretch',sets:'10 min'}]},
};

const MILESTONES=[7,14,30,60,90,180];
const HCATS=[...new Set(HABITS.map(h=>h.cat))];
const HTOTAL=HABITS.length;

// ═══ CURRICULUM ═══
const TRAILS=[
  {
    id:'trail1', name:'Salesforce Marketing Cloud Basics', icon:'📧', color:'#f59e0b',
    points:1800, badgeEmoji:'🥉', badgeName:'SFMC Explorer',
    description:'Get started with Salesforce Marketing Cloud — learn what it is, how to navigate it, and how to send your first email campaign.',
    modules:[
      {
        id:'m1', title:'Get Started with Marketing Cloud', units:3, points:300,
        units_list:[
          {id:'u1', title:'What Is Salesforce Marketing Cloud?', type:'module', duration:'10 min', points:100,
           overview:'Salesforce Marketing Cloud (SFMC) is a digital marketing platform that helps companies send the right message to the right person at the right time across email, SMS, social, and advertising channels.',
           concepts:['SFMC is Salesforce's marketing automation platform used by B2C companies','Key studios: Email Studio, Mobile Studio, Social Studio, Advertising Studio, Journey Builder, Content Builder, Automation Studio','A Business Unit (BU) is a sub-account within SFMC used to separate brands or regions','SFMC differs from Sales Cloud: SFMC = marketing to customers, Sales Cloud = managing sales pipeline','Typical users: Email Marketers, Marketing Ops, Developers, Admins'],
           practice:'Log in to a Trailhead Playground with SFMC enabled. Explore the App Switcher and identify each studio. Write a 3-sentence summary of what SFMC does.',
           quiz:[{q:'What is SFMC primarily used for?',a:'Digital marketing automation — sending messages across email, SMS, social, and advertising channels.',opts:['CRM and sales pipeline management','Digital marketing automation','Financial reporting','Customer service case management'],correct:0},{q:'What is a Business Unit in SFMC?',a:'A sub-account within SFMC used to separate brands, regions, or departments.',opts:['A team of marketers','A sub-account within SFMC','A type of email template','An automation workflow'],correct:1}]},
          {id:'u2', title:'Navigate Marketing Cloud', type:'module', duration:'10 min', points:100,
           overview:'Learn how to move around the SFMC interface — the App Switcher, Setup menu, and Content Builder are your key navigation points.',
           concepts:['The App Switcher (grid icon top-left) lets you jump between studios','Setup (cog icon) is where admin settings, user management, and configuration live','Content Builder is the central hub for all email and content assets','The navigation bar shows your current studio and recent items','Your user profile and business unit switcher are in the top-right corner'],
           practice:'Navigate to each of the following in your SFMC org: Email Studio, Content Builder, Automation Studio, Journey Builder. Screenshot or note one key feature in each.',
           quiz:[{q:'Where do you go to manage users in SFMC?',a:'Setup — accessed via the cog icon in the top navigation.',opts:['Content Builder','Journey Builder','Setup (cog icon)','Email Studio'],correct:2},{q:'What is Content Builder used for?',a:'Storing and managing all email content, images, templates, and assets.',opts:['Routing cases to agents','Managing subscriber lists only','Storing and managing all email content and assets','Setting up automations'],correct:3}]},
          {id:'u3', title:'SFMC Data Model — Subscribers & Data Extensions', type:'module', duration:'15 min', points:100,
           overview:'Understanding how SFMC stores contact data is critical. Learn the difference between subscribers, lists, and data extensions.',
           concepts:['A Subscriber is anyone who has opted in to receive communications — identified by a Subscriber Key','Lists are simple flat files of subscribers — easy but limited in structure','Data Extensions (DEs) are database tables with custom fields — flexible and powerful','Publication Lists track what a subscriber is opted into — required for compliance','Subscriber statuses: Active, Unsubscribed, Bounced, Held — each affects deliverability'],
           practice:'In SFMC, create a new Data Extension called "Practice_Contacts" with fields: FirstName (Text), LastName (Text), Email (EmailAddress), Country (Text). Add 3 test records manually.',
           quiz:[{q:'What is a Data Extension?',a:'A database table in SFMC with custom fields used to store subscriber and campaign data.',opts:['A type of email template','A database table with custom fields','A subscriber list limited to 500 contacts','A journey entry source'],correct:1},{q:'What subscriber status means emails are no longer delivered?',a:'Unsubscribed — the contact has opted out and will not receive further emails.',opts:['Active','Pending','Unsubscribed','Engaged'],correct:2}]},
        ]
      },
      {
        id:'m2', title:'Build and Send Your First Email', units:2, points:300,
        units_list:[
          {id:'u4', title:'Build Emails in Content Builder', type:'module', duration:'20 min', points:150,
           overview:'Content Builder is your drag-and-drop email editor. Learn how to create professional emails using blocks, templates, and dynamic content.',
           concepts:['Content Builder uses a block-based drag-and-drop editor — text, image, button, HTML, and layout blocks','Templates let you save reusable email designs — brand consistency at scale','CAN-SPAM requirements: physical address, unsubscribe link, sender name — legally required in every commercial email','GDPR adds: explicit consent, right to be forgotten, data transparency — critical for EU audiences','Pre-header text appears in the inbox preview next to the subject line — write it intentionally'],
           practice:'Build a welcome email in Content Builder: (1) Add your company logo as an image block, (2) Write a greeting paragraph, (3) Add a CTA button linking to a URL, (4) Add an unsubscribe link in the footer. Send a test email to yourself.',
           quiz:[{q:'What is required by CAN-SPAM in every commercial email?',a:'A physical mailing address and a working unsubscribe mechanism.',opts:['A discount code','A physical address and unsubscribe link','An image and a button','A subject line with the word "newsletter"'],correct:1},{q:'What is pre-header text?',a:'Preview text shown in the inbox next to the subject line — summarises the email before it is opened.',opts:['The first paragraph of the email body','Text shown before the email header image','Preview text shown in the inbox next to the subject line','The email footer disclaimer'],correct:2}]},
          {id:'u5', title:'Send and Track Email Performance', type:'module', duration:'15 min', points:150,
           overview:'Sending an email in SFMC involves a send definition — defining who receives it, when, and from which sending domain. Learn how to track results.',
           concepts:['A Send Definition links your email to an audience (data extension or list), a from address, and a send time','Always send a test email before going live — use Test Send to specific addresses','Key email metrics: Open Rate (% who opened), Click Rate (% who clicked a link), Bounce Rate (% undeliverable), Unsubscribe Rate','Hard bounce = permanent delivery failure (invalid address) — suppress these immediately','Soft bounce = temporary failure (inbox full, server down) — SFMC retries automatically'],
           practice:'Using your welcome email from the previous unit, create a send definition targeting your Practice_Contacts DE. Schedule it for 30 minutes from now. After sending, review the Tracking tab for opens, clicks, and bounces.',
           quiz:[{q:'What is a hard bounce?',a:'A permanent email delivery failure — usually an invalid or non-existent email address.',opts:['A temporary delivery failure','A permanent delivery failure','An email marked as spam','An unsubscribe request'],correct:1},{q:'What does Click Rate measure?',a:'The percentage of recipients who clicked at least one link in the email.',opts:['The percentage of emails delivered','The percentage of emails opened','The percentage of recipients who clicked a link','The number of emails sent'],correct:2}]},
        ]
      },
      {
        id:'m3', title:'Automate with Journey Builder', units:2, points:300,
        units_list:[
          {id:'u6', title:'Automate with Automation Studio', type:'module', duration:'15 min', points:150,
           overview:'Automation Studio handles batch and scheduled automation — data imports, SQL queries, and scheduled sends. It is the backbone of SFMC operations.',
           concepts:['Automation Studio runs scheduled or triggered workflows called Automations','Activities in an Automation: Import File, SQL Query, Send Email, Filter, Data Extract, Fire Event','Scheduled automations run on a cron-like schedule — hourly, daily, weekly','Triggered automations fire when a file lands in a watched FTP folder','The Activity Log shows run history — use it to diagnose failures and monitor performance'],
           practice:'Build a scheduled automation that: (1) Runs every Monday at 7am, (2) Imports a CSV from FTP into your Practice_Contacts DE, (3) Sends your welcome email to new contacts. Activate it in test mode.',
           quiz:[{q:'What is the purpose of Automation Studio?',a:'To run scheduled or triggered batch processes — data imports, queries, and sends — without manual intervention.',opts:['To design customer journeys with decision splits','To run scheduled or triggered batch processes','To build drag-and-drop email templates','To manage subscriber suppression lists'],correct:1},{q:'What does a SQL Query activity do in Automation Studio?',a:'Runs a SQL query against SFMC data extensions to create or update a target data extension.',opts:['Sends an email to a query result','Runs a SQL query to create or update a data extension','Imports data from Salesforce CRM','Exports data to an FTP folder'],correct:1}]},
          {id:'u7', title:'Build Customer Journeys in Journey Builder', type:'module', duration:'20 min', points:150,
           overview:'Journey Builder is SFMC's multi-step journey orchestration tool. Design personalised, automated customer experiences triggered by real behaviour.',
           concepts:['Journey Builder creates multi-step automated journeys triggered by customer data or behaviour','Entry Sources: Data Extension, Salesforce Data, CloudPages, API Event, Audience Builder','Key activities: Send Email, Send SMS, Wait, Decision Split, Engagement Split, Random Split, Update Contact','Decision Split routes contacts based on data attributes — e.g. Country = UK goes left, all others go right','Engagement Split routes based on email behaviour — opened, clicked, or no action','Journey settings: re-entry rules (can a contact enter again?), exit criteria, goal tracking'],
           practice:'Build a 3-step welcome journey: (1) Entry source: Practice_Contacts DE, (2) Send welcome email immediately, (3) Wait 3 days, (4) Decision Split: if contact opened email → send follow-up email, else → send re-engagement email. Activate in test mode.',
           quiz:[{q:'What is a Decision Split in Journey Builder?',a:'A split that routes contacts into different paths based on data attributes or field values.',opts:['A split based on email open and click behaviour','A random 50/50 split for A/B testing','A split based on data attributes or field values','A wait activity that pauses the journey'],correct:2},{q:'What does an Engagement Split do?',a:'Routes contacts based on their email engagement — whether they opened, clicked, or did not interact.',opts:['Splits contacts by geographic region','Routes contacts based on email engagement behaviour','Assigns contacts to different agents','Creates separate journeys for new vs returning contacts'],correct:1}]},
        ]
      },
    ]
  },
  {

    modules:[

           overview:'Salesforce is the world's #1 CRM platform. Learn what it is, how it works, and how to navigate Lightning Experience.',
           concepts:['Salesforce is a cloud-based CRM — Customer Relationship Management — platform','Main clouds: Sales Cloud (sales pipeline), Service Cloud (customer support), Experience Cloud (portals)','A Salesforce Org is your organisation's instance of Salesforce — your data, config, and users','Lightning Experience is the modern UI — faster, more customisable than the legacy Classic view','The App Launcher (grid icon) shows all available apps — each app is a collection of tabs and features'],

          {id:'u9', title:'Navigate Lightning Experience', type:'module', duration:'10 min', points:200,

        ]
      },
      {
        id:'m5', title:'Core CRM Objects', units:3, points:600,
        units_list:[
          {id:'u10', title:'Manage Leads and Contacts', type:'module', duration:'20 min', points:200,
           overview:'Leads and Contacts are the people in your CRM. Learn the difference, how to use them, and how Lead conversion works.',
           concepts:['A Lead is an unqualified prospect — someone who might become a customer but has not yet been vetted','A Contact is a qualified person linked to an Account — they are in your business relationship','Lead Conversion creates up to 3 records: Contact + Account + Opportunity — field mappings control what carries over','The Lead record becomes read-only after conversion — the original is preserved for reporting','Lead Status tracks progression: New → Working → Qualified → Converted or Unqualified'],
           practice:'(1) Create 3 Leads with different statuses (New, Working, Qualified). (2) Convert the Qualified lead — create a new Account and Opportunity during conversion. (3) Verify the new Contact, Account, and Opportunity were created. (4) Add a Contact Role to the Opportunity.',
           quiz:[{q:'What records are created during Lead conversion?',a:'A Contact, an Account, and optionally an Opportunity — all linked together.',opts:['Only a Contact','A Contact and an Account only','A Contact, an Account, and optionally an Opportunity','A Lead, Contact, and Case'],correct:2},{q:'What happens to a Lead after it is converted?',a:'The Lead record is marked as Converted and becomes read-only — it is preserved for historical reporting.',opts:['It is permanently deleted','It is archived and hidden from all views','It becomes read-only and is marked Converted','It is merged into the new Contact'],correct:2}]},
          {id:'u11', title:'Track Accounts and Opportunities', type:'module', duration:'20 min', points:200,
           overview:'Accounts represent the companies you do business with. Opportunities track potential deals. Together they form the heart of your sales pipeline.',
           concepts:['An Account is a company or organisation — stores billing info, contacts, cases, and opportunities','Account hierarchy: parent-child relationships allow you to model complex corporate structures','An Opportunity represents a potential sale — it has a Stage, Amount, Close Date, and Probability','Opportunity Stages represent your sales process: Prospecting → Qualification → Proposal → Negotiation → Closed Won/Lost','Probability is linked to Stage — Closed Won = 100%, Prospecting = typically 10%'],
           practice:'(1) Create an Account for a fictional company with Industry and Annual Revenue. (2) Create a child Account under it. (3) Add 3 Opportunities at different stages with amounts and close dates. (4) Move one Opportunity to Closed Won using the Kanban view.',
           quiz:[{q:'What is an Opportunity in Salesforce?',a:'A record that tracks a potential sale — including stage, amount, close date, and probability.',opts:['A customer support case','A potential sale tracked through your pipeline','A contact at a company','A product in your catalogue'],correct:1},{q:'What does Probability represent on an Opportunity?',a:'The likelihood (percentage) of winning the deal — typically linked to the opportunity stage.',opts:['The discount percentage applied','The number of contacts involved','The likelihood of winning the deal','The number of products in the quote'],correct:2}]},
          {id:'u12', title:'Log Activities — Tasks, Events, Calls', type:'module', duration:'15 min', points:200,
           overview:'Activity tracking is how sales reps record their interactions — calls, meetings, emails, and follow-ups. Learn to log and view activity history.',
           concepts:['Tasks are to-do items: call a prospect, send a proposal, follow up — assigned to a user with a due date','Events are calendar-based: meetings, demos, calls scheduled for a specific time — appear in calendar view','Log a Call records a completed phone conversation with notes — linked to the related record','The Activity Timeline on a record shows all past and upcoming activities in chronological order','Einstein Activity Capture auto-logs emails and events from Gmail/Outlook — reduces manual data entry'],
           practice:'On one of your Contacts: (1) Log a Call with a 3-sentence summary. (2) Create a follow-up Task due in 5 days. (3) Schedule a meeting Event for next week. (4) Review the Activity Timeline and confirm all 3 appear.',
           quiz:[{q:'What is the difference between a Task and an Event?',a:'Tasks are to-do items with a due date. Events are scheduled meetings with a specific start and end time on the calendar.',opts:['Tasks are for managers, Events are for reps','Tasks are to-do items with a due date; Events are scheduled meetings with a start and end time','Tasks can repeat; Events cannot','There is no difference — they are the same thing'],correct:1}]},
        ]
      },
      {
        id:'m6', title:'Salesforce Administration', units:3, points:600,
        units_list:[
          {id:'u13', title:'Manage Users, Profiles, and Roles', type:'module', duration:'20 min', points:200,
           overview:'As a Salesforce Admin, managing who can do what is your most important responsibility. Profiles control permissions; Roles control data visibility.',
           concepts:['A Profile is assigned to every user — it controls object permissions (Create/Read/Edit/Delete), field access, app visibility','Standard Profiles: System Administrator (full access), Standard User (sales rep), Read Only (view only)','A Role defines position in the hierarchy — managers above can see records owned by people below','Profiles control what you CAN DO; Roles control what records you CAN SEE','Permission Sets extend access beyond a Profile without changing it — best practice over creating custom profiles'],
           practice:'(1) Create a new user with Standard User profile. (2) Create a 2-level role hierarchy: Sales Manager → Sales Rep. Assign your new user to Sales Rep. (3) Create a Permission Set with Read access to a custom object. Assign it to your user. (4) Verify the user can see the expected records.',
           quiz:[{q:'What is the key difference between a Profile and a Role?',a:'Profiles control what actions a user can perform (permissions). Roles control which records a user can see (data access).',opts:['Profiles are for admins; Roles are for users','Profiles control permissions; Roles control record visibility','Profiles are assigned by managers; Roles are set by IT','There is no difference between them'],correct:1},{q:'When should you use a Permission Set instead of creating a new Profile?',a:'When you need to grant additional access to a subset of users — Permission Sets extend access without duplicating Profile configuration.',opts:['When you need to restrict a user's access','When creating a new department','When you need to grant specific additional access to some users','Only when onboarding new employees'],correct:2}]},
          {id:'u14', title:'Control Access with the Security Model', type:'module', duration:'20 min', points:200,
           overview:'Salesforce has a layered security model. Learn OWD, Role Hierarchy, Sharing Rules, and Field-Level Security — the four pillars of record access.',
           concepts:['Organisation-Wide Defaults (OWD) set the most restrictive baseline: Private, Public Read Only, or Public Read/Write','Role Hierarchy automatically shares records upward — a manager can see their direct reports' records','Sharing Rules extend access to specific groups beyond OWD — criteria-based or owner-based','Field-Level Security controls which users can see or edit individual fields — set per Profile/Permission Set','Manual Sharing lets record owners share specific records with individuals — one-off access grants'],
           practice:'(1) Review OWD for Accounts, Contacts, Opportunities, and Leads in Setup. (2) Create a criteria-based Sharing Rule on Account: share Technology industry accounts with the Sales Manager role. (3) Create a Validation Rule on Opportunity: Close Date cannot be in the past when Stage is Prospecting.',
           quiz:[{q:'What are Organisation-Wide Defaults?',a:'The most restrictive baseline record access for all users — defines who can see records they do not own.',opts:['Default user settings applied to new orgs','The most restrictive baseline access to records for all users','Settings that apply only to admin users','Default dashboard layouts for the whole organisation'],correct:1},{q:'What does a Sharing Rule do?',a:'Extends record access to specific users or groups beyond what OWD allows — without opening access to everyone.',opts:['Restricts record access for specific users','Extends record access to specific users beyond OWD','Replaces the Role Hierarchy for data access','Sets the default owner for new records'],correct:1}]},
          {id:'u15', title:'Customise with Objects, Fields, and Relationships', type:'module', duration:'25 min', points:200,
           overview:'Salesforce's power is in customisation — build a data model that fits your business using custom objects, fields, and relationships.',
           concepts:['Custom Objects store data not covered by standard objects — create them in Setup → Object Manager','Field types: Text, Number, Date, Picklist, Checkbox, Currency, Formula, Lookup, Master-Detail','Lookup: loose relationship — child can exist without parent, no cascade delete','Master-Detail: tight relationship — child cannot exist without parent, cascade delete applies, enables Roll-Up Summary','Roll-Up Summary fields on a parent: COUNT, SUM, MIN, MAX of child records — Master-Detail only'],
           practice:'(1) Create a custom object "Training__c" with fields: Name (Text), Start_Date__c (Date), Category__c (Picklist: Internal/External), Active__c (Checkbox). (2) Create a Master-Detail relationship from Training__c to Contact. (3) Add a Roll-Up Summary on Contact that COUNTs related Training records.',
           quiz:[{q:'What is the key difference between a Lookup and a Master-Detail relationship?',a:'In Master-Detail, the child cannot exist without the parent and cascade delete applies. In Lookup, the child is independent.',opts:['Lookup is for standard objects; Master-Detail is for custom objects only','Master-Detail allows the child to exist independently; Lookup does not','In Master-Detail, the child cannot exist without the parent; in Lookup, the child is independent','They are the same — just different names for the same relationship type'],correct:2},{q:'On which relationship type can you create a Roll-Up Summary field?',a:'Master-Detail only — Roll-Up Summary fields aggregate child data on the parent and require a Master-Detail relationship.',opts:['Lookup only','Both Lookup and Master-Detail','Master-Detail only','Neither — Roll-Up Summary is a separate feature'],correct:2}]},
        ]
      },
      {
        id:'m7', title:'Automate with Salesforce Flow', units:2, points:500,
        units_list:[
          {id:'u16', title:'Build Record-Triggered and Screen Flows', type:'module', duration:'30 min', points:250,
           overview:'Salesforce Flow is the #1 automation tool for admins — replacing Workflow Rules and Process Builder. Learn to build record-triggered and screen flows.',
           concepts:['Flow types: Record-Triggered (auto-runs on record changes), Screen Flow (guided UI), Scheduled Flow (time-based), Autolaunched Flow (called from Apex)','Before Save flows run before the record is committed — fast, for updating fields on the same record','After Save flows run after commit — use for related record updates, emails, external calls','Screen Flow elements: Text Input, Picklist, Display Text, Radio Buttons, File Upload — collect user input step by step','Always use the Debug button to test a flow before activating — saves time diagnosing logic errors'],
           practice:'(1) Build a Before-Save Record-Triggered Flow on Opportunity: when Stage changes to Closed Won, set Description = "Won on " + Today's Date. (2) Build a Screen Flow that collects a Contact's Name and Email, then creates the Contact record. Add it to the Contact home page as a button.',
           quiz:[{q:'What is the key difference between Before Save and After Save in a Record-Triggered Flow?',a:'Before Save runs before the record is written to the database — faster and ideal for updating fields on the same record. After Save runs after commit and is used for related records.',opts:['Before Save is for new records; After Save is for updates','Before Save runs before the record is saved to the database; After Save runs after','Before Save sends emails; After Save updates records','They run at the same time but in different order'],correct:1},{q:'What element would you use in a Screen Flow to let the user choose from a dropdown?',a:'A Picklist screen component — it presents the user with a list of values to choose from.',opts:['Text Input','Display Text','Picklist','Radio Buttons only'],correct:2}]},
          {id:'u17', title:'Build Scheduled Flows and Handle Errors', type:'module', duration:'25 min', points:250,
           overview:'Scheduled Flows run automatically at a defined time against a batch of records. Learn to build them correctly and handle errors gracefully.',
           concepts:['Scheduled Flows: configure a Start time, Frequency (once, daily, weekly), and a filter to define which records to process','Get Records element retrieves a collection of records — apply filters to limit what you process','Loop element iterates over a collection — put logic inside, then a single DML operation outside the loop','Fault Connector handles errors on any element — always add one to prevent silent failures','Governor Limits: max 100 SOQL queries and 150 DML per transaction — avoid DML inside loops (bulkification)'],
           practice:'Build a Scheduled Flow that runs every Monday at 8am: (1) Get all Opportunities with Close Date in the next 7 days and Stage not Closed. (2) Loop through them. (3) Create a Task for each Opportunity's owner with Subject = "Follow up: " + Opportunity Name. Add a Fault path that sends an admin alert email if anything fails.',
           quiz:[{q:'Why should you avoid putting DML operations inside a Loop in a Flow?',a:'Each DML inside a loop counts separately against governor limits — 150 max per transaction. Collect records first, then do a single DML outside the loop.',opts:['DML inside a loop causes infinite recursion','It slows the flow but has no other impact','Each DML counts against governor limits — you can hit the 150 limit quickly','Loops do not support DML operations at all'],correct:2}]},
        ]
      },
      {
        id:'m8', title:'Reports, Dashboards, and Service Cloud', units:2, points:600,
        units_list:[
          {id:'u18', title:'Build Reports and Dashboards', type:'module', duration:'25 min', points:300,
           overview:'Reports and Dashboards turn your Salesforce data into actionable insights. Learn to build all report types and create compelling dashboards.',
           concepts:['Report types: Tabular (flat list), Summary (grouped with subtotals), Matrix (grouped by rows AND columns), Joined (two report types side by side)','Filters narrow your data: standard filters, field filters, cross-filters (e.g. Accounts WITHOUT Opportunities)','Bucket fields group values on-the-fly without changing underlying data — e.g. bucket Amount into Small/Medium/Large','Dashboard components: Chart, Table, Gauge, Metric — each powered by a report','Dynamic Dashboards show each viewer their own data — powered by "Run as logged-in user" setting'],
           practice:'(1) Build a Summary report: Opportunities grouped by Stage with SUM of Amount per stage. Add a bucket field grouping Amount into <$10K, $10K-$50K, >$50K. (2) Create a Sales Dashboard with 4 components: pipeline bar chart, closed won metric, top 5 opportunities table, win rate gauge. Set it as dynamic.',
           quiz:[{q:'Which report type allows you to group data by both rows AND columns simultaneously?',a:'Matrix report — it groups records by a row field and a column field, showing aggregated values at each intersection.',opts:['Tabular','Summary','Matrix','Joined'],correct:2},{q:'What is a dynamic dashboard?',a:'A dashboard that shows each viewer their own data, based on their own record access — powered by "Run as logged-in user".',opts:['A dashboard that refreshes every 5 minutes automatically','A dashboard that shows each viewer their own data based on their access','A dashboard with animated chart transitions','A dashboard that sends email alerts when metrics change'],correct:1}]},
          {id:'u19', title:'Service Cloud — Cases, Console, and SLAs', type:'module', duration:'25 min', points:300,
           overview:'Service Cloud powers customer support. Learn to manage Cases, use the Service Console, set up Entitlements and SLAs, and route work with Omni-Channel.',
           concepts:['A Case is the core Service Cloud object — tracks a customer issue from creation to resolution','Case lifecycle: New → In Progress → Escalated → Closed — customise stages to match your support process','The Service Console is a multi-tab workspace optimised for support agents — shows related records in split-screen','Entitlements define what level of support a customer is entitled to — attach to Account or Contact','Milestones within an Entitlement Process set SLA timers — e.g. First Response within 2 hours, Resolution within 24 hours','Omni-Channel routes Cases automatically to available agents based on their capacity and skills'],
           practice:'(1) Create 5 test Cases with different Origins (Web, Phone, Email) and Priorities. (2) Open the Service Console and navigate its multi-tab layout. (3) Create an Entitlement Process with two Milestones: First Response (2 hours) and Resolution (24 hours). Attach it to a test Case.',
           quiz:[{q:'What is an Entitlement Milestone?',a:'A time-based checkpoint within an Entitlement Process — e.g. First Response must happen within 2 hours of Case creation.',opts:['A customer satisfaction score threshold','A time-based SLA checkpoint within an Entitlement Process','A badge awarded when a case is resolved','A required step in the case escalation process'],correct:1}]},
        ]
      },
    ]
  },
  {
    id:'trail3', name:'Data Management and Integration', icon:'🗄️', color:'#22c55e',
    points:1500, badgeEmoji:'🏆', badgeName:'Data Specialist',
    description:'Master Salesforce data management — imports, data quality, duplicate prevention, and integration fundamentals with APIs and AppExchange.',
    modules:[
      {
        id:'m9', title:'Import and Manage Data', units:2, points:500,
        units_list:[
          {id:'u20', title:'Import Data with Import Wizard and Data Loader', type:'module', duration:'20 min', points:250,
           overview:'Learn to import and export Salesforce data using the built-in Import Wizard for everyday use and the Data Loader for large volumes.',
           concepts:['Data Import Wizard: browser-based, max 50,000 records, handles Leads, Contacts, Accounts, custom objects — best for admins','Data Loader: desktop app, millions of records, all objects, supports insert/update/upsert/delete/export — best for large migrations','Always prepare your CSV: correct field names, valid field values, required fields populated','Field Mapping: map CSV column headers to Salesforce field API names — save mappings for reuse','Upsert: insert new records AND update existing ones in a single operation — requires an External ID field'],
           practice:'(1) Prepare a CSV with 10 fictional Contact records. (2) Import using Data Import Wizard — map all fields. (3) Review the success/error report. (4) Export all Contacts using Data Loader. (5) Update 3 records in the CSV and perform an upsert back into Salesforce.',
           quiz:[{q:'What is the maximum number of records the Data Import Wizard can handle?',a:'50,000 records — for larger volumes, use the Data Loader which has no practical limit.',opts:['1,000','10,000','50,000','1,000,000'],correct:2},{q:'What does an Upsert operation do?',a:'Inserts new records where no match exists AND updates existing records where a match is found — in a single operation.',opts:['Updates all existing records and deletes duplicates','Inserts new records only','Inserts new records AND updates existing matching records in one operation','Permanently deletes records that fail validation'],correct:2}]},
          {id:'u21', title:'Maintain Data Quality with Duplicate Rules', type:'module', duration:'20 min', points:250,

  {cat:'Admin Fundamentals',color:'#7c6af7',qs:[
    {q:'What is the difference between a Profile and a Permission Set?',a:'A Profile is mandatory for every user and controls their baseline access — object permissions, field access, app visibility. A Permission Set extends access on top of a Profile without changing it. Best practice is to use minimal Profiles and extend with Permission Sets for flexibility.'},
    {q:'Explain the Salesforce security model from top to bottom.',a:'The security model has 4 layers: (1) Organisation level — login hours, IP restrictions; (2) Object level — Profiles/Permission Sets control CRUD on objects; (3) Field level — field-level security controls field visibility; (4) Record level — OWD sets baseline, Role Hierarchy opens up access upward, Sharing Rules extend to specific groups, Manual Sharing for individual records.'},
    {q:'What is OWD and why does it matter?',a:'Organisation-Wide Defaults set the most restrictive baseline access to records. If OWD is Private, users can only see records they own. The Role Hierarchy, Sharing Rules, and Manual Sharing can then open up access — but never restrict below OWD. Start restrictive and open up as needed.'},
    {q:'What is the difference between a Lookup and a Master-Detail relationship?',a:'A Lookup is a loose relationship — the child can exist without the parent, and deleting the parent does not delete the child. A Master-Detail is a tight relationship — the child cannot exist without the parent, deleting the parent deletes all children (cascade delete), and Roll-Up Summary fields are only available on Master-Detail.'},
    {q:'What is a Roll-Up Summary field?',a:'A Roll-Up Summary field on a parent object aggregates data from related child records in a Master-Detail relationship. You can COUNT, SUM, MIN, or MAX child field values. For example, counting the number of Cases on an Account, or summing the Amount of all Opportunities on an Account.'},
    {q:'What is a Validation Rule?',a:'A Validation Rule enforces data quality by evaluating a formula when a record is saved. If the formula returns TRUE, Salesforce shows an error message and prevents saving. For example: preventing a Close Date in the past when Stage is Prospecting, or requiring a phone number when Account Type is Customer.'},
  ]},
  {cat:'Salesforce Flow',color:'#22c55e',qs:[
    {q:'What types of Flows are available in Salesforce?',a:'There are 4 main Flow types: (1) Record-Triggered Flow — runs automatically when a record is created, updated, or deleted; (2) Screen Flow — guides users through a multi-step UI process; (3) Scheduled Flow — runs on a defined schedule against a batch of records; (4) Autolaunched Flow — runs in the background, typically called from Apex or another Flow.'},
    {q:'What is the difference between Before Save and After Save in a Record-Triggered Flow?',a:'Before Save runs before the record is written to the database — it is faster and efficient for updating fields on the same record. After Save runs after the record is committed — use it when you need to create or update related records, send emails, or call external systems. Never use After Save to update the triggering record (causes extra DML).'},
    {q:'What is bulkification and why does it matter in Flow?',a:'Bulkification means processing multiple records in a single transaction efficiently. In Flow, if you have a Get Records or DML operation inside a Loop, it runs once per record — causing governor limit issues at scale. The solution is to collect records into a Collection variable, then perform a single DML operation outside the loop.'},
    {q:'How do you handle errors in a Flow?',a:'You add a Fault connector to any element that could fail (DML operations, Apex calls, external service calls). The Fault path handles the error gracefully — typically sending an admin notification email with the error message, or logging the failure. Without a Fault connector, the Flow fails silently with a generic error to the user.'},
    {q:'When would you use a Subflow?',a:'A Subflow calls one Flow from another, enabling reusability. For example, if you have a common sequence of steps (like sending a notification email and creating a task) used in multiple Flows, extract it into a reusable Autolaunched Flow and call it as a Subflow. This follows the DRY principle and makes maintenance easier.'},
  ]},
  {cat:'Sales Cloud',color:'#f59e0b',qs:[
    {q:'What is the Lead conversion process?',a:'Lead conversion creates up to 3 records simultaneously: a Contact (from the Lead person), an Account (from the Lead company), and optionally an Opportunity. Field mappings control which Lead fields carry over to each new record. The original Lead record is marked as Converted and becomes read-only. Custom Lead fields need manual mapping to appear on converted records.'},
    {q:'What is Collaborative Forecasting?',a:'Collaborative Forecasting predicts revenue based on opportunities in the pipeline. Each opportunity\'s forecast category (Pipeline, Best Case, Commit, Closed) rolls up through the Role Hierarchy. Managers can view and override their team\'s forecasts. It is configured per fiscal period and relies on accurate Opportunity data — Stage, Amount, and Close Date.'},
    {q:'What are Contact Roles on an Opportunity?',a:'Contact Roles define who is involved in a deal and their role in the buying decision — for example, Decision Maker, Economic Buyer, Champion, or Technical Evaluator. They link Contacts to Opportunities without making the Contact the primary owner. Contact Roles are important for reporting on deal influence and for identifying who to engage during the sales cycle.'},
  ]},
  {cat:'Service Cloud',color:'#f43f5e',qs:[
    {q:'What is an Entitlement and how does it work?',a:'An Entitlement defines what level of support a customer is entitled to — for example, 24/7 phone support or a 4-hour response SLA. Entitlements attach to Accounts or Contacts. When a Case is created, the Entitlement Process starts Milestone timers automatically. If a Milestone is not completed on time, escalation actions trigger — like sending emails or changing priority.'},
    {q:'What is Omni-Channel and why is it used?',a:'Omni-Channel is a routing framework that automatically assigns Cases (or other work items) to the right agent based on their availability, capacity, and skills. Agents set their Presence Status (Available, Busy, Away) and Omni-Channel routes work to them in real time. It replaces manual queue management and ensures no work items are missed or over-assigned.'},
    {q:'What is Email-to-Case?',a:'Email-to-Case automatically creates a Case in Salesforce when a customer sends an email to a support address. Each reply from the customer or agent is captured as a Case Comment in the Case Feed, keeping the full conversation history on the record. It is configured in Setup under Email-to-Case settings with a routing address per support queue.'},
  ]},
  {cat:'SFMC',color:'#38c98a',qs:[
    {q:'What is the difference between a List and a Data Extension in SFMC?',a:'Lists are simple, flat subscriber stores — easy to use but limited in structure. Data Extensions are flexible database tables with custom fields and relationships, suitable for complex data models. Lists are fine for small, simple sends. Data Extensions are required for segmentation, relational data, triggered sends, and any campaign involving custom subscriber attributes.'},
    {q:'What is AMPscript and when do you use it?',a:'AMPscript is SFMC\'s proprietary scripting language used inside email content to personalise at the individual subscriber level. You use it to look up data extension values (LookupRows), conditionally show/hide content (IF/THEN), format dates and strings, and create dynamic content blocks. It runs server-side at send time for each subscriber.'},
    {q:'What is Journey Builder used for?',a:'Journey Builder is SFMC\'s customer journey orchestration tool. It allows marketers to design multi-step, multi-channel journeys triggered by a customer action or data change — such as a welcome series, abandoned cart reminder, or re-engagement campaign. Contacts move through the journey based on their behaviour and decision split outcomes.'},
  ]},

   description:'Write a bulkified trigger handler that updates the Account\'s Description when any related Opportunity is Closed Won.',
   code:`trigger OpportunityTrigger on Opportunity (after update) {
    
    // Collect Account Ids — no SOQL in loop
    Set<Id> accountIds = new Set<Id>();
    for (Opportunity opp : Trigger.new) {
        Opportunity oldOpp = Trigger.oldMap.get(opp.Id);
        if (opp.StageName == 'Closed Won' 
            && oldOpp.StageName != 'Closed Won') {
            accountIds.add(opp.AccountId);
        }
    }
    
    if (accountIds.isEmpty()) return;
    
    // Single SOQL query outside loop
    List<Account> accounts = [
        SELECT Id, Description 
        FROM Account 
        WHERE Id IN :accountIds
    ];
    
    // Update in memory, single DML outside loop

let S={startDate:todayKey(),days:{},col:{},learnDone:{},learnSession:{},learnExpanded:{},prepDone:{},prepShown:{},codeExpanded:{},codeDone:{}};

function todayKey(){return new Date().toISOString().split('T')[0]}
function dKey(ago){const d=new Date();d.setDate(d.getDate()-ago);return d.toISOString().split('T')[0]}
function load(){try{const r=localStorage.getItem('gainz4');if(r)S=JSON.parse(r)}catch(e){}}
function save(){try{localStorage.setItem('gainz4',JSON.stringify(S))}catch(e){}}

// HABIT FUNCTIONS
function score(k){if(!S.days[k])return 0;return Math.round(HABITS.filter(h=>S.days[k][h.id]).length/HTOTAL*100)}
function streak(){let s=0,i=0;while(score(dKey(i))>=80&&i<200){s++;i++;}return s}
function best(){let b=0,c=0;for(let i=180;i>=0;i--){score(dKey(i))>=80?b=Math.max(b,++c):c=0;}return b}
function wavg(){let t=0;for(let i=0;i<7;i++)t+=score(dKey(i));return Math.round(t/7)}
function mavg(){let t=0,c=0;for(let i=0;i<30;i++){const s=score(dKey(i));if(s>0){t+=s;c++;}}return c>0?Math.round(t/c):0}
function sc(p){return p>=90?'#22c55e':p>=70?'#f59e0b':p>=50?'#7c6af7':'#f43f5e'}
function hstreak(id){let s=0,i=0;while(S.days[dKey(i)]&&S.days[dKey(i)][id]&&i<200){s++;i++;}return s}
function toggle(id){const k=todayKey();if(!S.days[k])S.days[k]={};S.days[k][id]=!S.days[k][id];save();render()}
function toggleCat(c){S.col[c]=!S.col[c];save();render()}
function setHabitNav(n){habitNav=n;render()}

// LEARN FUNCTIONS
function getDayNum(){const s=new Date(S.startDate),t=new Date();s.setHours(0,0,0,0);t.setHours(0,0,0,0);return Math.max(1,Math.floor((t-s)/86400000)+1)}
function getTodayTopic(){return CURRICULUM[(getDayNum()-1)%CURRICULUM.length]}
function markDone(id){S.learnDone[id]=!S.learnDone[id];save();render();}
function setSession(id,sess){S.learnSession[id]=sess;save();render()}
function toggleLearnExpand(id){S.learnExpanded[id]=!S.learnExpanded[id];save();render()}
function getLearnProgress(){return Math.round((Object.keys(S.learnDone).filter(k=>S.learnDone[k]).length/CURRICULUM.length)*100)}
function setLearnNav(n){learnNav=n;selectedTopicId=null;selectedModuleId=null;selectedTrailId=null;render();window.scrollTo(0,0);}

function navTrail(id){selectedTrailId=id;selectedModuleId=null;selectedTopicId=null;learnNav='trail';render();window.scrollTo(0,0);}
function navModule(tid,mid){selectedTrailId=tid;selectedModuleId=mid;selectedTopicId=null;learnNav='module';render();window.scrollTo(0,0);}

  else if(learnNav==='trail'){learnNav='trails';selectedTrailId=null;render();window.scrollTo(0,0);}
}

  quizState[key]=optIdx;
  render();
}
function getTotalPoints(){
  let pts=0;
  TRAILS.forEach(tr=>tr.modules.forEach(m=>m.units_list.forEach(u=>{if(S.learnDone[u.id])pts+=u.points;})));
  return pts;
}
function getTotalPossible(){return TRAILS.reduce((a,tr)=>a+tr.points,0);}
function getTrailPoints(trail){
  let pts=0;trail.modules.forEach(m=>m.units_list.forEach(u=>{if(S.learnDone[u.id])pts+=u.points;}));return pts;
}
function getTrailTotal(trail){return trail.modules.reduce((a,m)=>a+m.units_list.reduce((b,u)=>b+u.points,0),0);}
function getModulePoints(mod){return mod.units_list.reduce((a,u)=>a+(S.learnDone[u.id]?u.points:0),0);}
function getAllUnits(){const us=[];TRAILS.forEach(tr=>tr.modules.forEach(m=>m.units_list.forEach(u=>us.push({...u,trail:tr,module:m}))));return us;}

function formatTime(s){const m=Math.floor(s/60);const sec=s%60;return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`}
function startTimer(){if(timerRunning)return;timerRunning=true;timerInterval=setInterval(()=>{if(timerSeconds>0){timerSeconds--;const el=document.getElementById('timer-display');if(el)el.textContent=formatTime(timerSeconds);}else{clearInterval(timerInterval);timerRunning=false;}},1000)}
function pauseTimer(){clearInterval(timerInterval);timerRunning=false;}
function resetTimer(secs){clearInterval(timerInterval);timerRunning=false;timerSeconds=secs;const el=document.getElementById('timer-display');if(el)el.textContent=formatTime(timerSeconds);}

function togglePrepShown(catIdx,qIdx){const key=catIdx+'_'+qIdx;S.prepShown[key]=!S.prepShown[key];save();render()}

let statsTab='overview';

function destroyChart(id){if(statsCharts[id]){statsCharts[id].destroy();delete statsCharts[id];}}

function setStatsTab(t){
  statsTab=t;
  document.querySelectorAll('.stats-tab').forEach((b,i)=>b.classList.toggle('active',['overview','habits','learning','streaks'][i]===t));
  renderStatsContent();
}

function scColor(p){return p>=90?'#22c55e':p>=70?'#f59e0b':p>=50?'#7c6af7':'#f43f5e';}

function getDayScoreStats(k){
  if(!S.days||!S.days[k])return 0;
  return Math.round(HABITS.filter(h=>S.days[k][h.id]).length/HTOTAL*100);
}
function dKeyStats(ago){const d=new Date();d.setDate(d.getDate()-ago);return d.toISOString().split('T')[0];}
function getStreakStats(){let s=0,i=0;while(getDayScoreStats(dKeyStats(i))>=80&&i<200){s++;i++;}return s;}
function getBestStreakStats(){let b=0,c=0;for(let i=180;i>=0;i--){getDayScoreStats(dKeyStats(i))>=80?b=Math.max(b,++c):c=0;}return b;}
function getAvgStats(days){let t=0,c=0;for(let i=0;i<days;i++){const s=getDayScoreStats(dKeyStats(i));if(s>0){t+=s;c++;}}return c>0?Math.round(t/c):0;}
function getLearnPctStats(){
  if(!S.learnDone)return 0;
  const total=TRAILS.reduce((a,tr)=>a+tr.modules.reduce((b,m)=>b+m.units_list.length,0),0);
  return total>0?Math.round(Object.keys(S.learnDone).filter(k=>S.learnDone[k]).length/total*100):0;
}
function getPrepPctStats(){if(!S.prepDone)return 0;return Math.round(Object.keys(S.prepDone).filter(k=>S.prepDone[k]).length/36*100);}
function getCodePctStats(){if(!S.codeDone)return 0;return Math.round(Object.keys(S.codeDone).filter(k=>S.codeDone[k]).length/CODING.length*100);}
function getActiveDaysStats(){if(!S.days)return 0;return Object.keys(S.days).filter(k=>Object.values(S.days[k]).some(v=>v)).length;}

      h+=`<div class="mcell ${i===0?'tod':''}" style="background:${bg}">${d.getDate()}</div>`;

    h+=`<div class="workout-banner" onclick="toggleWorkout()">

      <button class="log-save-btn" onclick="saveWorkoutLog()">Save today's log</button>
    </div>`;

    HCATS.forEach(cat=>{
      const ch=HABITS.filter(h=>h.cat===cat);const col=HCOLORS[cat];
      const done=ch.filter(h=>S.days[k]&&S.days[k][h.id]).length;const open=!S.col[cat];
      h+=`<div class="cat-card">
        <div class="cat-hdr" onclick="toggleCat('${cat}')">
          <div class="cat-bar" style="background:${col}"></div>
          <div class="cat-title" style="color:${col}">${cat}</div>
          <div class="cat-sc">${done}/${ch.length}</div>
          <div class="cat-chev ${open?'open':''}">▼</div>
        </div>`;
      if(open){ch.forEach(hb=>{
        const on=!!(S.days[k]&&S.days[k][hb.id]);const hs=hstreak(hb.id);
        h+=`<div class="hrow" onclick="toggle(${hb.id})" style="${on?'background:'+col+'15':''}">
          <div class="chk ${on?'on':''}" style="${on?'background:'+col:''}"><span class="chkmark">✓</span></div>
          <span class="hemoji">${hb.emoji}</span>
          <span class="hlabel ${on?'done':''}">${hb.label}</span>
          ${hs>1?`<span class="hstrk">🔥${hs}</span>`:''}
        </div>`;
      });}
      h+=`</div>`;
    });
    const msg=ts===100?'🏆 Perfect day. Consistency is the real flex.':ts>=80?'💪 Strong day. Almost there!':ts>=50?'📈 Halfway there. Keep going!':'🎯 Your system is ready. Start now!';
    h+=`<div class="note">${msg}</div>`;
  }
  document.getElementById('main').innerHTML=h;
}

function toggleWorkout(){S.wktExpanded=S.wktExpanded===false?true:false;save();render();}

function saveWorkoutLog(){
  const note=document.getElementById('workout-note');
  if(!note||!note.value.trim())return;
  if(!S.workoutLogs)S.workoutLogs=[];
  const d=new Date();
  const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  const dateStr=dow+' '+d.toLocaleDateString('en',{day:'numeric',month:'short',year:'numeric'});
  S.workoutLogs.push({date:dateStr,note:note.value.trim()});
  if(S.workoutLogs.length>50)S.workoutLogs=S.workoutLogs.slice(-50);
  save();render();
}

          </div>`;
        });
        if(answered){h+=`<div style="background:rgba(124,106,247,0.1);border-radius:8px;padding:10px;font-size:12px;color:var(--accent);margin-top:4px">💡 ${q.a}</div>`;}
        h+=`</div>`;
      });
      h+=`</div>`;
    }

    // Mark complete button
    h+=`<div style="margin:0 12px 12px">
      <button onclick="markDone('${unitData.id}')" style="width:100%;padding:14px;background:${done?'var(--green)':'var(--accent)'};border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px">
        ${done?'✓ Unit Complete — '+unitData.points+' pts earned':'Mark Complete +'+unitData.points+' pts'}
      </button>
      <div style="display:flex;gap:8px">
        ${prevUnit?`<button onclick="navTopic('${prevUnit.id}')" style="flex:1;padding:10px;background:var(--card);border:0.5px solid var(--border);border-radius:10px;color:var(--text);font-size:12px;cursor:pointer">← Previous</button>`:'<div style="flex:1"></div>'}
        ${nextUnit?`<button onclick="navTopic('${nextUnit.id}')" style="flex:1;padding:10px;background:var(--card);border:0.5px solid var(--border);border-radius:10px;color:var(--text);font-size:12px;cursor:pointer">Next →</button>`:`<button onclick="navModule('${trail.id}','${mod.id}')" style="flex:1;padding:10px;background:${trail.color};border:none;border-radius:10px;color:#fff;font-size:12px;cursor:pointer;font-weight:700">Finish Module ✓</button>`}
      </div>
    </div>`;
  }

  document.getElementById('main').innerHTML=h;

  // Fix quiz onclick after render
  if(learnNav==='unit'){
    const unitData=getAllUnits().find(u=>u.id===selectedTopicId);
    if(unitData&&unitData.quiz){
      unitData.quiz.forEach((q,qi)=>{
        q.opts.forEach((opt,oi)=>{
          const key=unitData.id+'_'+qi;
          if(quizState[key]===undefined){
            const els=document.querySelectorAll('[data-quiz="'+unitData.id+'_'+qi+'_'+oi+'"]');
          }
        });
      });
    }
  }
}
function renderInterview(){
  const totalQ=INTERVIEW_PREP.reduce((a,c)=>a+c.qs.length,0);
  const doneQ=Object.keys(S.prepDone).filter(k=>S.prepDone[k]).length;
  let h='';

  h+=`<div class="prep-header">
    <div class="dash-label">Daily Interview Prep</div>
    <div class="prep-title">30 Min</div>
    <div class="prep-sub">Practice ${totalQ} Salesforce interview questions across ${INTERVIEW_PREP.length} categories · ${doneQ}/${totalQ} answered</div>
    <div class="timer-box">
      <div class="timer-display" id="timer-display">${formatTime(timerSeconds)}</div>
      <div class="timer-label">Session timer — aim for 30 minutes</div>
      <div class="timer-btns">
        <button class="timer-btn" style="background:var(--green);color:#fff" onclick="startTimer()">▶ Start</button>
        <button class="timer-btn" style="background:var(--bg2);color:var(--text)" onclick="pauseTimer()">⏸ Pause</button>
        <button class="timer-btn" style="background:var(--bg2);color:var(--text)" onclick="resetTimer(1800)">↺ Reset</button>
      </div>
    </div>
    <div class="score-track"><div class="score-fill" style="width:${Math.round(doneQ/totalQ*100)}%;background:var(--coral)"></div></div>
    <div style="font-size:11px;color:var(--muted);margin-top:6px">${Math.round(doneQ/totalQ*100)}% complete</div>
  </div>`;

  INTERVIEW_PREP.forEach((cat,ci)=>{
    const catDone=cat.qs.filter((_,qi)=>S.prepDone[ci+'_'+qi]).length;
    h+=`<div class="prep-card">
      <div class="prep-cat-hdr" onclick="toggleCat('prep_'+${ci})">
        <div class="cat-bar" style="background:${cat.color}"></div>
        <div class="cat-title" style="color:${cat.color}">${cat.cat}</div>
        <div class="cat-sc">${catDone}/${cat.qs.length}</div>
        <div class="cat-chev ${!S.col['prep_'+ci]?'open':''}">▼</div>
      </div>`;
    if(!S.col['prep_'+ci]){
      cat.qs.forEach((q,qi)=>{
        const done=S.prepDone[ci+'_'+qi];const shown=S.prepShown[ci+'_'+qi];
        h+=`<div class="prep-q-row">
          <div style="display:flex;align-items:flex-start;gap:8px">
            <div class="chk ${done?'on':''}" style="${done?'background:'+cat.color+';border-color:'+cat.color:'border-color:'+cat.color};flex-shrink:0;margin-top:2px"><span class="chkmark">✓</span></div>
            <div style="flex:1">
              <div class="prep-q">${q.q}</div>
              <div class="prep-a ${shown?'show':''}">${q.a}</div>
              <div style="display:flex;gap:8px;margin-top:6px">
                <button class="prep-ans-btn" onclick="togglePrepShown(${ci},${qi})">${shown?'Hide answer':'Show answer'}</button>
                <button class="prep-ans-btn" style="color:${done?'var(--green)':'var(--muted)'}" onclick="togglePrepDone(${ci},${qi})">${done?'✓ Got it':'Mark as known'}</button>
              </div>
            </div>
          </div>
        </div>`;
      });
    }
    h+=`</div>`;
  });
  document.getElementById('main').innerHTML=h;
}

function renderCoding(){
  const totalEx=CODING.length;
  const doneEx=Object.keys(S.codeDone).filter(k=>S.codeDone[k]).length;
  let h='';

  h+=`<div class="code-header">
    <div class="dash-label">Daily Coding Mastery</div>
    <div class="code-title">1 Hour</div>
    <div class="code-sub">Master SOQL, Apex, and LWC through hands-on exercises · ${doneEx}/${totalEx} completed</div>
    <div class="timer-box">
      <div class="timer-display" id="timer-display">${formatTime(timerSeconds)}</div>
      <div class="timer-label">Session timer — aim for 1 hour</div>
      <div class="timer-btns">
        <button class="timer-btn" style="background:var(--green);color:#fff" onclick="startTimer()">▶ Start</button>
        <button class="timer-btn" style="background:var(--bg2);color:var(--text)" onclick="pauseTimer()">⏸ Pause</button>
        <button class="timer-btn" style="background:var(--bg2);color:var(--text)" onclick="resetTimer(3600)">↺ Reset 1hr</button>
      </div>
    </div>
    <div class="score-track"><div class="score-fill" style="width:${Math.round(doneEx/totalEx*100)}%;background:var(--green)"></div></div>
    <div style="font-size:11px;color:var(--muted);margin-top:6px">${Math.round(doneEx/totalEx*100)}% complete · ${doneEx}/${totalEx} exercises done</div>
  </div>`;

  // Group by tag
  const tags=[...new Set(CODING.map(c=>c.tag))];
  tags.forEach(tag=>{
    const tagEx=CODING.filter(c=>c.tag===tag);const col=tagEx[0].color;
    const tagDone=tagEx.filter(c=>S.codeDone[c.id]).length;
    h+=`<div class="phase-section"><div class="phase-label" style="color:${col}">● ${tag} <span style="color:var(--muted);font-weight:400">${tagDone}/${tagEx.length}</span></div>`;
    tagEx.forEach(ex=>{
      const open=S.codeExpanded[ex.id];const done=S.codeDone[ex.id];
      const diffColor=ex.difficulty==='Beginner'?'#22c55e':ex.difficulty==='Intermediate'?'#f59e0b':'#f43f5e';
      h+=`<div class="code-card">
        <div class="code-hdr" onclick="toggleCodeExpand(${ex.id})">
          <div class="topic-num" style="background:${col}22;color:${col}">${ex.id}</div>
          <div class="topic-info">
            <div class="topic-title" style="${done?'text-decoration:line-through;color:var(--muted)':''}">${ex.title}</div>
            <div class="topic-sub">${ex.tag}</div>
          </div>
          <div class="diff-badge" style="background:${diffColor}22;color:${diffColor}">${ex.difficulty}</div>
          <div class="topic-chev ${open?'open':''}">▼</div>
        </div>`;
      if(open){
        h+=`<div class="code-body">
          <div class="section-title">Description</div>
          <p style="font-size:13px;line-height:1.6;margin-bottom:8px">${ex.description}</p>
          <div class="section-title">Solution Code</div>
          <div class="code-block">${ex.code}</div>
          <div class="section-title">Your Challenge</div>
          <div class="code-task">${ex.task}</div>
          <div class="section-title">Key Concept</div>
          <p style="font-size:13px;color:var(--muted);line-height:1.6">${ex.explanation}</p>
          <button class="mark-done-btn ${done?'done':''}" onclick="toggleCodeDone(${ex.id});event.stopPropagation()">${done?'✓ Exercise Complete':'Mark as Complete'}</button>
        </div>`;
      }
      h+=`</div>`;
    });
    h+=`</div>`;
  });
  document.getElementById('main').innerHTML=h;
}

load();render();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
